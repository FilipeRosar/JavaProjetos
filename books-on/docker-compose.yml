  version: '3.8'

  services:
    db:
      image: mysql:8.0
      container_name: mysql_container
      restart: always
      environment:
        MYSQL_DATABASE: mvc_db
        MYSQL_ROOT_PASSWORD: root
        MYSQL_USER: user_java
        MYSQL_PASSWORD: alunolab
      ports:
        - "3306:3306"
      volumes:
        - mysql_data:/var/lib/mysql

    app:
      build: .
      container_name: java_app
      restart: on-failure
      depends_on:
        - db
      ports:
        - "8080:8080"
      environment:
        SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/mvc_db
        SPRING_DATASOURCE_USERNAME: user_java
        SPRING_DATASOURCE_PASSWORD: password123

  volumes:
    mysql_data: